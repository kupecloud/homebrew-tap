name: Validate

# Runs on every push and PR to catch malformed casks — typically these
# come from goreleaser bugs or hand-edits (don't hand-edit).
#
# `brew style --cask` and `brew audit --cask` require the cask to live
# inside a tap-shaped path ($(brew --repo)/Library/Taps/<owner>/homebrew-<short>/Casks/),
# not a standalone file. We symlink the checked-out repo into that path
# so the tools can resolve `kupecloud/tap/kupe` by namespace.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brew-audit:
    name: brew style + brew audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Symlink workspace into Homebrew's tap directory
        # ubuntu-latest ships Linuxbrew at /home/linuxbrew/.linuxbrew. The
        # tap path is fixed by the repo name: tap = repo basename minus
        # `homebrew-` prefix. So `kupecloud/homebrew-tap` becomes
        # `kupecloud/tap` for brew namespacing.
        run: |
          set -euo pipefail
          BREW=/home/linuxbrew/.linuxbrew/bin/brew
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "HOMEBREW_NO_AUTO_UPDATE=1" >> "$GITHUB_ENV"
          echo "HOMEBREW_NO_INSTALL_FROM_API=1" >> "$GITHUB_ENV"
          TAP_DIR="$($BREW --repo)/Library/Taps/kupecloud/homebrew-tap"
          rm -rf "$TAP_DIR"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: brew style (cask)
        run: brew style --cask kupecloud/tap/kupe

      - name: brew audit (cask, online — checks URL liveness, license, sha256)
        run: brew audit --cask --online --strict kupecloud/tap/kupe
